<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' https://cdnjs.cloudflare.com data:; img-src 'self' https: data:; connect-src 'self'; upgrade-insecure-requests">
    <title>技术博客</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-muted: #eef2f5;
            --text: #20242a;
            --muted: #66717f;
            --line: #dbe2ea;
            --primary: #245b7b;
            --primary-dark: #173c52;
            --accent: #c45f3c;
            --success: #287d56;
            --shadow: 0 12px 30px rgba(31, 42, 55, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(36, 91, 123, 0.08), transparent 340px),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input {
            font: inherit;
        }

        .shell {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(219, 226, 234, 0.86);
            background: rgba(244, 246, 248, 0.9);
            backdrop-filter: blur(16px);
        }

        .header-inner {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 22px;
            align-items: center;
            min-height: 74px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: 0;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 18px rgba(36, 91, 123, 0.24);
        }

        .search {
            position: relative;
            width: min(520px, 100%);
            justify-self: center;
        }

        .search i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .search input {
            width: 100%;
            height: 44px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            outline: none;
            padding: 0 16px 0 42px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(36, 91, 123, 0.13);
        }

        a:focus-visible,
        button:focus-visible,
        input:focus-visible {
            outline: 3px solid rgba(196, 95, 60, 0.85);
            outline-offset: 3px;
        }

        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0 0 0 0);
            clip-path: inset(50%);
            white-space: nowrap;
        }

        .header-count {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 92px;
            justify-content: flex-end;
            color: var(--muted);
            font-size: 0.92rem;
            white-space: nowrap;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 30px;
            align-items: end;
            padding: 48px 0 28px;
        }

        .hero-copy h1 {
            max-width: 720px;
            font-size: clamp(2.05rem, 5vw, 4.2rem);
            line-height: 1.05;
            color: var(--primary-dark);
            letter-spacing: 0;
        }

        .hero-copy p {
            max-width: 680px;
            margin-top: 18px;
            color: var(--muted);
            font-size: 1.04rem;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .stat {
            min-height: 96px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
        }

        .stat strong {
            display: block;
            color: var(--primary-dark);
            font-size: 1.8rem;
            line-height: 1;
        }

        .stat span {
            display: block;
            margin-top: 9px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 30px;
            align-items: start;
            padding: 12px 0 56px;
        }

        .sidebar {
            position: sticky;
            top: 94px;
            display: grid;
            gap: 18px;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 8px 24px rgba(31, 42, 55, 0.04);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 12px;
            color: var(--primary-dark);
            font-weight: 750;
        }

        .category-list {
            display: grid;
            gap: 4px;
            padding: 0 8px 10px;
        }

        .category-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            padding: 0 10px;
            text-align: left;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--surface-muted);
            color: var(--primary-dark);
        }

        .category-btn.active {
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .category-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .category-count {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .recent-list {
            display: grid;
            gap: 12px;
            padding: 0 16px 16px;
        }

        .recent-link {
            display: grid;
            gap: 4px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }

        .recent-link:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .recent-link strong {
            color: var(--text);
            font-size: 0.94rem;
            line-height: 1.4;
        }

        .recent-link span {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .content {
            display: grid;
            gap: 24px;
            min-width: 0;
        }

        .featured {
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr);
            min-height: 320px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .featured-body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 28px;
            padding: 32px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 0.84rem;
            font-weight: 760;
        }

        .featured h2 {
            margin-top: 14px;
            color: var(--primary-dark);
            font-size: clamp(1.65rem, 3vw, 2.45rem);
            line-height: 1.18;
        }

        .featured p {
            margin-top: 14px;
            color: var(--muted);
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .meta-row span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .featured-image {
            display: block;
            min-height: 100%;
            aspect-ratio: 3 / 2;
            background: var(--surface-muted);
        }

        .featured-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .section-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding-top: 2px;
        }

        .section-bar h2 {
            color: var(--primary-dark);
            font-size: 1.35rem;
        }

        .result-count {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .post-list {
            display: grid;
            gap: 14px;
        }

        .post-card {
            display: grid;
            grid-template-columns: 176px minmax(0, 1fr);
            gap: 18px;
            min-height: 148px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
        }

        .post-card:hover {
            border-color: rgba(36, 91, 123, 0.38);
            box-shadow: 0 12px 28px rgba(31, 42, 55, 0.1);
            transform: translateY(-2px);
        }

        .post-card > a {
            display: block;
            aspect-ratio: 3 / 2;
            background: var(--surface-muted);
        }

        .post-thumb {
            width: 100%;
            height: 100%;
            min-height: 148px;
            object-fit: cover;
            background: var(--surface-muted);
        }

        .post-body {
            display: grid;
            align-content: center;
            gap: 10px;
            min-width: 0;
            padding: 18px 20px 18px 0;
        }

        .post-title {
            color: var(--text);
            font-size: 1.16rem;
            line-height: 1.35;
        }

        .post-title a:hover {
            color: var(--primary);
        }

        .post-excerpt {
            display: -webkit-box;
            overflow: hidden;
            color: var(--muted);
            font-size: 0.94rem;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            width: max-content;
            max-width: 100%;
            min-height: 26px;
            padding: 0 9px;
            border-radius: 6px;
            background: rgba(36, 91, 123, 0.1);
            color: var(--primary-dark);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .read-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: max-content;
            color: var(--primary);
            font-weight: 760;
            font-size: 0.92rem;
        }

        .empty-state {
            display: none;
            border: 1px dashed var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            color: var(--muted);
            padding: 36px;
            text-align: center;
        }

        .site-footer {
            border-top: 1px solid var(--line);
            color: var(--muted);
            padding: 26px 0;
            font-size: 0.9rem;
        }

        @media (max-width: 960px) {
            .header-inner {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 14px 0;
            }

            .search {
                justify-self: stretch;
                width: 100%;
            }

            .header-count {
                display: none;
            }

            .hero,
            .layout,
            .featured {
                grid-template-columns: 1fr;
            }

            .hero {
                padding-top: 34px;
            }

            .sidebar {
                position: static;
                grid-template-columns: 1fr;
            }

            .featured-image {
                min-height: 260px;
                order: -1;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 24px, 1180px);
            }

            .hero-stats {
                grid-template-columns: 1fr;
            }

            .featured-body {
                padding: 22px;
            }

            .post-card {
                grid-template-columns: 1fr;
            }

            .post-thumb {
                height: 190px;
            }

            .post-body {
                padding: 0 18px 18px;
            }

            .section-bar {
                align-items: flex-start;
                flex-direction: column;
            }
        }

        /* UI refresh: knowledge-base editorial surface */
        :root {
            --bg: #f7f3ea;
            --surface: #fffdf8;
            --surface-muted: #ede7da;
            --text: #191a1d;
            --muted: #62666d;
            --line: #ded6c8;
            --primary: #1f4d7a;
            --primary-dark: #101820;
            --accent: #b84c27;
            --success: #2f7654;
            --shadow: 0 18px 44px rgba(16, 24, 32, 0.1);
        }

        body {
            background:
                linear-gradient(90deg, rgba(16, 24, 32, 0.035) 1px, transparent 1px),
                linear-gradient(180deg, rgba(16, 24, 32, 0.035) 1px, transparent 1px),
                var(--bg);
            background-size: 34px 34px;
        }

        .shell {
            width: min(1220px, calc(100% - 48px));
        }

        .site-header {
            border-bottom: 2px solid var(--primary-dark);
            background: rgba(255, 253, 248, 0.94);
        }

        .header-inner {
            min-height: 82px;
        }

        .brand {
            font-size: 1.02rem;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border: 2px solid var(--primary-dark);
            border-radius: 0;
            background: var(--accent);
            box-shadow: 6px 6px 0 var(--primary-dark);
        }

        .search {
            width: min(620px, 100%);
        }

        .search i {
            color: var(--primary-dark);
        }

        .search input {
            height: 50px;
            border: 2px solid var(--primary-dark);
            border-radius: 0;
            background: #fffefb;
            box-shadow: 5px 5px 0 rgba(16, 24, 32, 0.12);
        }

        .search input:focus {
            border-color: var(--accent);
            box-shadow: 5px 5px 0 rgba(184, 76, 39, 0.22);
        }

        .header-count {
            min-height: 44px;
            padding: 0 14px;
            border: 2px solid var(--primary-dark);
            background: var(--primary-dark);
            color: #fffdf8;
            justify-content: center;
        }

        .hero {
            grid-template-columns: minmax(0, 1fr) minmax(230px, 300px);
            align-items: stretch;
            padding: 72px 0 42px;
        }

        .hero-copy {
            border-left: 8px solid var(--accent);
            padding-left: 28px;
        }

        .hero-copy h1 {
            max-width: 780px;
            color: var(--primary-dark);
            font-size: clamp(2.8rem, 7vw, 5.8rem);
            line-height: 0.96;
        }

        .hero-copy p {
            max-width: 620px;
            margin-top: 24px;
            color: var(--text);
            font-size: 1.15rem;
        }

        .hero-stats {
            align-self: end;
            grid-template-columns: 1fr;
            gap: 0;
            border: 2px solid var(--primary-dark);
            background: var(--primary-dark);
            box-shadow: 8px 8px 0 rgba(16, 24, 32, 0.18);
        }

        .stat {
            min-height: 112px;
            border: 0;
            border-bottom: 1px solid rgba(255, 253, 248, 0.22);
            border-radius: 0;
            background: transparent;
        }

        .stat:last-child {
            border-bottom: 0;
        }

        .stat strong {
            color: #fffdf8;
            font-size: 2.6rem;
        }

        .stat span {
            color: #d9d2c5;
            letter-spacing: 0.04em;
        }

        .layout {
            grid-template-columns: 290px minmax(0, 1fr);
            gap: 34px;
        }

        .panel,
        .featured,
        .post-card,
        .empty-state {
            border: 2px solid var(--primary-dark);
            border-radius: 0;
            background: var(--surface);
            box-shadow: 6px 6px 0 rgba(16, 24, 32, 0.1);
        }

        .panel-header {
            border-bottom: 2px solid var(--primary-dark);
            background: var(--surface-muted);
        }

        .category-btn {
            min-height: 44px;
            border-radius: 0;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--primary-dark);
            color: #fffdf8;
        }

        .category-btn.active {
            box-shadow: inset 5px 0 0 var(--accent);
        }

        .category-btn.active .category-count,
        .category-btn:hover .category-count {
            color: #fffdf8;
        }

        .recent-link {
            padding: 10px 0 14px;
        }

        .featured {
            grid-template-columns: minmax(0, 1fr) minmax(260px, 420px);
            background: var(--primary-dark);
            color: #fffdf8;
        }

        .featured-body {
            padding: 38px;
        }

        .featured h2,
        .featured h2 a {
            color: #fffdf8;
        }

        .featured p,
        .featured .meta-row {
            color: #d9d2c5;
        }

        .eyebrow,
        .read-link {
            color: #ffb18d;
        }

        .read-link {
            min-height: 44px;
            padding: 0 2px;
        }

        .featured-image {
            min-width: 0;
            overflow: hidden;
            border-left: 2px solid var(--primary-dark);
        }

        .featured-image img {
            filter: saturate(0.85) contrast(1.08);
        }

        .post-list {
            gap: 16px;
        }

        .post-card {
            grid-template-columns: 144px minmax(0, 1fr);
            min-height: 132px;
            transition: transform 0.18s, box-shadow 0.18s, background-color 0.18s;
        }

        .post-card:hover {
            border-color: var(--primary-dark);
            background: #fff8ea;
            box-shadow: 9px 9px 0 rgba(16, 24, 32, 0.16);
            transform: translate(-2px, -2px);
        }

        .post-card > a {
            border-right: 2px solid var(--primary-dark);
        }

        .post-thumb {
            min-height: 132px;
            filter: saturate(0.78);
        }

        .post-body {
            padding: 20px 22px 20px 0;
        }

        .post-title {
            font-size: 1.22rem;
        }

        .tag {
            min-height: 30px;
            border: 1px solid var(--primary-dark);
            border-radius: 0;
            background: #f1dfc8;
            color: var(--primary-dark);
            letter-spacing: 0.02em;
        }

        @media (max-width: 960px) {
            .header-inner {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 14px 0;
            }

            .search {
                justify-self: stretch;
                width: 100%;
            }

            .header-count {
                display: none;
            }

            .hero,
            .layout,
            .featured {
                grid-template-columns: 1fr;
            }

            .hero-copy {
                padding-left: 20px;
            }

            .hero-stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .stat {
                border-bottom: 0;
                border-right: 1px solid rgba(255, 253, 248, 0.22);
            }

            .stat:last-child {
                border-right: 0;
            }

            .featured-image {
                border-left: 0;
                border-bottom: 2px solid var(--primary-dark);
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 28px, 1220px);
            }

            .header-inner {
                min-height: 0;
            }

            .brand-mark {
                width: 40px;
                height: 40px;
                box-shadow: 4px 4px 0 var(--primary-dark);
            }

            .hero {
                padding: 38px 0 28px;
            }

            .hero-copy h1 {
                font-size: clamp(2.25rem, 15vw, 3.35rem);
            }

            .hero-stats {
                grid-template-columns: 1fr 1fr;
            }

            .stat {
                min-height: 94px;
                padding: 16px;
            }

            .stat strong {
                font-size: 2rem;
            }

            .featured,
            .post-card {
                grid-template-columns: 1fr;
            }

            .featured-body {
                padding: 24px;
            }

            .featured-image {
                min-height: 0;
                aspect-ratio: 16 / 9;
            }

            .post-card > a {
                border-right: 0;
                border-bottom: 2px solid var(--primary-dark);
            }

            .post-thumb {
                height: 176px;
                min-height: 176px;
            }

            .post-body {
                padding: 18px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                scroll-behavior: auto !important;
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }

        :root {
            --bg: #f3f6f4;
            --surface: #fbfcf8;
            --surface-muted: #e8eee8;
            --surface-strong: #111820;
            --text: #17202a;
            --muted: #5d6873;
            --line: #cdd8d2;
            --primary: #d85635;
            --primary-dark: #111820;
            --accent: #d85635;
            --success: #276c50;
            --shadow: 0 22px 55px rgba(17, 24, 32, 0.11);
            --radius: 10px;
            --radius-small: 6px;
            --radius-pill: 999px;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #111713;
                --surface: #18211c;
                --surface-muted: #223029;
                --surface-strong: #eef4ed;
                --text: #edf3ec;
                --muted: #aebaae;
                --line: #344339;
                --primary: #ff8a63;
                --primary-dark: #f6f1e8;
                --accent: #ff8a63;
                --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
            }
        }

        body {
            min-height: 100dvh;
            background:
                radial-gradient(circle at 12% 0%, rgba(216, 86, 53, 0.12), transparent 26rem),
                linear-gradient(90deg, rgba(17, 24, 32, 0.045) 1px, transparent 1px),
                linear-gradient(180deg, rgba(17, 24, 32, 0.04) 1px, transparent 1px),
                var(--bg);
            background-size: auto, 42px 42px, 42px 42px, auto;
            font-family: "Aptos", "Segoe UI", "Microsoft YaHei UI", "PingFang SC", sans-serif;
        }

        .site-header {
            border-bottom: 1px solid color-mix(in srgb, var(--line), var(--text) 18%);
            background: color-mix(in srgb, var(--surface), transparent 9%);
            box-shadow: 0 1px 0 rgba(17, 24, 32, 0.04);
        }

        .header-inner {
            min-height: 72px;
        }

        .brand {
            color: var(--text);
            font-weight: 850;
            letter-spacing: 0;
            text-transform: none;
        }

        .brand-mark {
            width: 42px;
            height: 42px;
            border: 1px solid var(--line);
            border-radius: var(--radius-small);
            background: var(--surface-strong);
            color: var(--bg);
            box-shadow: none;
        }

        .search input {
            height: 48px;
            border: 1px solid var(--line);
            border-radius: var(--radius-pill);
            background: color-mix(in srgb, var(--surface), transparent 5%);
            box-shadow: 0 12px 26px rgba(17, 24, 32, 0.06);
        }

        .search input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px color-mix(in srgb, var(--primary), transparent 82%);
        }

        .header-count {
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: var(--radius-pill);
            background: var(--surface);
            color: var(--text);
        }

        .hero {
            min-height: clamp(360px, 48dvh, 520px);
            grid-template-columns: minmax(0, 1fr) minmax(240px, 310px);
            align-items: center;
            padding: 62px 0 44px;
        }

        .hero-copy {
            max-width: 820px;
            border-left: 0;
            padding-left: 0;
        }

        .hero-copy h1 {
            color: var(--text);
            font-size: clamp(2.55rem, 7vw, 5.2rem);
            line-height: 1;
            text-wrap: balance;
        }

        .hero-copy p {
            max-width: 600px;
            color: var(--muted);
            font-size: clamp(1rem, 1.6vw, 1.18rem);
        }

        .hero-stats {
            gap: 10px;
            border: 0;
            background: transparent;
            box-shadow: none;
        }

        .stat {
            min-height: 124px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background:
                linear-gradient(135deg, color-mix(in srgb, var(--surface), transparent 2%), color-mix(in srgb, var(--surface-muted), transparent 18%));
            box-shadow: 0 16px 34px rgba(17, 24, 32, 0.08);
        }

        .stat strong {
            color: var(--text);
        }

        .stat span {
            color: var(--muted);
        }

        .layout {
            grid-template-columns: 280px minmax(0, 1fr);
            gap: 32px;
            padding-bottom: 72px;
        }

        .panel,
        .featured,
        .post-card,
        .empty-state {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: color-mix(in srgb, var(--surface), transparent 2%);
            box-shadow: 0 16px 36px rgba(17, 24, 32, 0.07);
        }

        .panel-header {
            border-bottom: 1px solid var(--line);
            background: transparent;
            color: var(--text);
        }

        .category-btn {
            border-radius: var(--radius-small);
            color: var(--muted);
            transition: background-color 0.18s, color 0.18s, transform 0.18s;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--surface-muted);
            color: var(--text);
            transform: translateX(2px);
        }

        .category-btn.active {
            box-shadow: inset 4px 0 0 var(--primary);
        }

        .featured {
            min-height: 360px;
            grid-template-columns: minmax(0, 0.95fr) minmax(300px, 1.05fr);
            overflow: hidden;
            background: var(--surface-strong);
            color: var(--bg);
        }

        .featured-body {
            padding: clamp(24px, 4vw, 42px);
        }

        .featured h2,
        .featured h2 a {
            color: var(--bg);
        }

        .featured p,
        .featured .meta-row {
            color: color-mix(in srgb, var(--bg), transparent 24%);
        }

        .eyebrow,
        .read-link {
            color: var(--primary);
        }

        .featured-image {
            border-left: 1px solid color-mix(in srgb, var(--bg), transparent 78%);
        }

        .featured-image img,
        .post-thumb {
            filter: saturate(0.78) contrast(1.08);
        }

        .section-bar h2 {
            color: var(--text);
            font-size: clamp(1.28rem, 2vw, 1.65rem);
        }

        .post-list {
            gap: 18px;
        }

        .post-card {
            grid-template-columns: 168px minmax(0, 1fr);
            min-height: 150px;
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s, background-color 0.18s;
        }

        .post-card:hover {
            border-color: color-mix(in srgb, var(--primary), var(--line) 35%);
            background: color-mix(in srgb, var(--surface), var(--primary) 4%);
            box-shadow: var(--shadow);
            transform: translateY(-3px);
        }

        .post-card > a {
            border-right: 1px solid var(--line);
        }

        .post-title {
            color: var(--text);
        }

        .tag {
            min-height: 30px;
            border: 1px solid color-mix(in srgb, var(--primary), transparent 42%);
            border-radius: var(--radius-pill);
            background: color-mix(in srgb, var(--primary), transparent 90%);
            color: var(--text);
        }

        .site-footer {
            border-top: 1px solid var(--line);
            background: color-mix(in srgb, var(--surface), transparent 35%);
        }

        @media (prefers-reduced-motion: no-preference) {
            .hero-copy,
            .hero-stats,
            .featured,
            .post-card,
            .panel {
                animation: archive-rise 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
            }

            .hero-stats {
                animation-delay: 0.08s;
            }

            .featured {
                animation-delay: 0.14s;
            }
        }

        @keyframes archive-rise {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 960px) {
            .hero,
            .layout {
                grid-template-columns: 1fr;
            }

            .hero {
                min-height: auto;
                padding-top: 40px;
            }

            .hero-stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .stat {
                border-right: 1px solid var(--line);
            }

            .featured {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
                grid-template-columns: 1fr;
            }

            .featured-image {
                border-left: 0;
                border-bottom: 1px solid color-mix(in srgb, var(--bg), transparent 78%);
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 28px, 1220px);
            }

            .hero-copy h1 {
                font-size: clamp(2.25rem, 13vw, 3.25rem);
            }

            .hero-copy p {
                max-width: 34ch;
            }

            .hero-stats {
                grid-template-columns: 1fr 1fr;
            }

            .featured,
            .post-card {
                grid-template-columns: 1fr;
            }

            .post-card > a {
                border-right: 0;
                border-bottom: 1px solid var(--line);
            }

            .post-body {
                padding: 18px;
            }
        }
    </style>
    <link rel="stylesheet" href="art-theme.css">
</head>
<body>
    <header class="site-header">
        <div class="shell header-inner">
            <a class="brand" href="./index.html" aria-label="返回首页">
                <span class="brand-mark"><i class="fas fa-pen-nib"></i></span>
                <span>技术博客</span>
            </a>

            <label class="search" for="search-input">
                <i class="fas fa-magnifying-glass"></i>
                <span class="visually-hidden">搜索文章</span>
                <input id="search-input" type="search" placeholder="搜索文章标题、摘要、分类">
            </label>

            <div class="header-count">
                <i class="fas fa-layer-group"></i>
                <span id="header-count">0 篇</span>
            </div>
        </div>
    </header>

    <main class="shell">
        <section class="hero">
            <div class="hero-copy">
                <h1>记录项目、代码与工程经验</h1>
                <p>把实践中的问题、方案和复盘整理成文章，方便回看，也方便继续迭代。</p>
            </div>

            <div class="hero-stats" aria-label="博客统计">
                <div class="stat">
                    <strong id="stat-posts">0</strong>
                    <span>文章</span>
                </div>
                <div class="stat">
                    <strong id="stat-categories">0</strong>
                    <span>分类</span>
                </div>
            </div>
        </section>

        <div class="layout" id="blog">
            <aside class="sidebar">
                <section class="panel">
                    <div class="panel-header">
                        <span>分类</span>
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <div class="category-list" id="category-list"></div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <span>最近更新</span>
                        <i class="fas fa-clock-rotate-left"></i>
                    </div>
                    <div class="recent-list" id="recent-list"></div>
                </section>
            </aside>

            <section class="content">
                <article class="featured" id="featured-post"></article>

                <div class="section-bar">
                    <h2>全部文章</h2>
                    <span class="result-count" id="result-count">正在加载...</span>
                </div>

                <div class="post-list" id="post-list"></div>
                <div class="empty-state" id="empty-state">没有找到匹配的文章</div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="shell">© <span id="year"></span> 技术博客</div>
    </footer>

    <script>
        const state = {
            posts: [],
            activeCategory: '全部',
            query: ''
        };

        const fallbackImage = 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=1170&q=80';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            document.getElementById('search-input').addEventListener('input', event => {
                state.query = event.target.value.trim().toLowerCase();
                render();
            });
            loadPosts();
        });

        async function loadPosts() {
            try {
                const response = await fetch('posts-config.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('posts-config.json 加载失败');
                }

                const config = await response.json();
                state.posts = Array.isArray(config.posts) ? config.posts : [];
                render();
            } catch (error) {
                console.error(error);
                document.getElementById('result-count').textContent = '加载失败';
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('empty-state').textContent = '文章配置加载失败';
            }
        }

        function render() {
            const categories = getCategories(state.posts);
            const filteredPosts = getFilteredPosts();

            renderStats(categories);
            renderCategories(categories);
            renderRecentPosts(state.posts);
            renderFeatured(state.posts[0]);
            renderPostList(filteredPosts);
        }

        function getCategories(posts) {
            const counts = posts.reduce((map, post) => {
                const category = normalizeCategory(post.category);
                map.set(category, (map.get(category) || 0) + 1);
                return map;
            }, new Map());

            return [
                { name: '全部', count: posts.length },
                ...Array.from(counts, ([name, count]) => ({ name, count }))
                    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, 'zh-CN'))
            ];
        }

        function getFilteredPosts() {
            return state.posts.filter(post => {
                const category = normalizeCategory(post.category);
                const matchesCategory = state.activeCategory === '全部' || category === state.activeCategory;
                const haystack = [
                    post.title,
                    post.excerpt,
                    post.category,
                    post.date
                ].join(' ').toLowerCase();
                return matchesCategory && haystack.includes(state.query);
            });
        }

        function renderStats(categories) {
            document.getElementById('stat-posts').textContent = state.posts.length;
            document.getElementById('stat-categories').textContent = Math.max(categories.length - 1, 0);
            document.getElementById('header-count').textContent = `${state.posts.length} 篇`;
        }

        function renderCategories(categories) {
            const container = document.getElementById('category-list');
            container.innerHTML = '';

            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = `category-btn${category.name === state.activeCategory ? ' active' : ''}`;
                button.type = 'button';
                button.innerHTML = `
                    <span class="category-name">${escapeHtml(category.name)}</span>
                    <span class="category-count">${category.count}</span>
                `;
                button.addEventListener('click', () => {
                    state.activeCategory = category.name;
                    render();
                });
                container.appendChild(button);
            });
        }

        function renderRecentPosts(posts) {
            const container = document.getElementById('recent-list');
            container.innerHTML = posts.slice(0, 5).map(post => `
                <a class="recent-link" href="${escapeAttribute(post.link || '#')}">
                    <strong>${escapeHtml(post.title || '无标题')}</strong>
                    <span>${escapeHtml(post.date || '')}</span>
                </a>
            `).join('');
        }

        function renderFeatured(post) {
            const container = document.getElementById('featured-post');
            if (!post) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'grid';
            container.innerHTML = `
                <div class="featured-body">
                    <div>
                        <span class="eyebrow"><i class="fas fa-bookmark"></i> 最新文章</span>
                        <h2><a href="${escapeAttribute(post.link || '#')}">${escapeHtml(post.title || '无标题')}</a></h2>
                        <p>${escapeHtml(post.excerpt || '暂无摘要')}</p>
                    </div>
                    <div>
                        <div class="meta-row">
                            <span><i class="fas fa-calendar"></i>${escapeHtml(post.date || '')}</span>
                            <span><i class="fas fa-clock"></i>${escapeHtml(post.readTime || '')}</span>
                            <span><i class="fas fa-folder"></i>${escapeHtml(normalizeCategory(post.category))}</span>
                        </div>
                        <a class="read-link" href="${escapeAttribute(post.link || '#')}">阅读全文 <i class="fas fa-arrow-right"></i></a>
                    </div>
                </div>
                <a class="featured-image" href="${escapeAttribute(post.link || '#')}">
                    <img src="${escapeAttribute(post.image || fallbackImage)}" alt="${escapeAttribute(post.title || '文章封面')}" width="1170" height="780" loading="eager" fetchpriority="high">
                </a>
            `;
        }

        function renderPostList(posts) {
            const container = document.getElementById('post-list');
            const emptyState = document.getElementById('empty-state');

            document.getElementById('result-count').textContent = `${posts.length} 篇文章`;
            emptyState.style.display = posts.length ? 'none' : 'block';

            container.innerHTML = posts.map(post => `
                <article class="post-card">
                    <a href="${escapeAttribute(post.link || '#')}" aria-label="${escapeAttribute(post.title || '阅读全文')}">
                        <img class="post-thumb" src="${escapeAttribute(post.image || fallbackImage)}" alt="${escapeAttribute(post.title || '文章封面')}" width="1170" height="780" loading="lazy">
                    </a>
                    <div class="post-body">
                        <span class="tag">${escapeHtml(normalizeCategory(post.category))}</span>
                        <h3 class="post-title">
                            <a href="${escapeAttribute(post.link || '#')}">${escapeHtml(post.title || '无标题')}</a>
                        </h3>
                        <p class="post-excerpt">${escapeHtml(post.excerpt || '暂无摘要')}</p>
                        <div class="meta-row">
                            <span><i class="fas fa-calendar"></i>${escapeHtml(post.date || '')}</span>
                            <span><i class="fas fa-clock"></i>${escapeHtml(post.readTime || '')}</span>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function normalizeCategory(category) {
            return String(category || '未分类').replace(/^\[|\]$/g, '') || '未分类';
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }
    </script>
</body>
</html>
