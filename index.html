<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术博客</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #f4f6f8;
            --surface: #ffffff;
            --surface-muted: #eef2f5;
            --text: #20242a;
            --muted: #66717f;
            --line: #dbe2ea;
            --primary: #245b7b;
            --primary-dark: #173c52;
            --accent: #c45f3c;
            --success: #287d56;
            --shadow: 0 12px 30px rgba(31, 42, 55, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background:
                linear-gradient(180deg, rgba(36, 91, 123, 0.08), transparent 340px),
                var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        button,
        input {
            font: inherit;
        }

        .shell {
            width: min(1180px, calc(100% - 40px));
            margin: 0 auto;
        }

        .site-header {
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid rgba(219, 226, 234, 0.86);
            background: rgba(244, 246, 248, 0.9);
            backdrop-filter: blur(16px);
        }

        .header-inner {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 22px;
            align-items: center;
            min-height: 74px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--primary-dark);
            letter-spacing: 0;
        }

        .brand-mark {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 18px rgba(36, 91, 123, 0.24);
        }

        .search {
            position: relative;
            width: min(520px, 100%);
            justify-self: center;
        }

        .search i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
        }

        .search input {
            width: 100%;
            height: 44px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            color: var(--text);
            outline: none;
            padding: 0 16px 0 42px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(36, 91, 123, 0.13);
        }

        .header-count {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-width: 92px;
            justify-content: flex-end;
            color: var(--muted);
            font-size: 0.92rem;
            white-space: nowrap;
        }

        .hero {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 30px;
            align-items: end;
            padding: 48px 0 28px;
        }

        .hero-copy h1 {
            max-width: 720px;
            font-size: clamp(2.05rem, 5vw, 4.2rem);
            line-height: 1.05;
            color: var(--primary-dark);
            letter-spacing: 0;
        }

        .hero-copy p {
            max-width: 680px;
            margin-top: 18px;
            color: var(--muted);
            font-size: 1.04rem;
        }

        .hero-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .stat {
            min-height: 96px;
            padding: 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.78);
        }

        .stat strong {
            display: block;
            color: var(--primary-dark);
            font-size: 1.8rem;
            line-height: 1;
        }

        .stat span {
            display: block;
            margin-top: 9px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px minmax(0, 1fr);
            gap: 30px;
            align-items: start;
            padding: 12px 0 56px;
        }

        .sidebar {
            position: sticky;
            top: 94px;
            display: grid;
            gap: 18px;
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 8px 24px rgba(31, 42, 55, 0.04);
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 16px 12px;
            color: var(--primary-dark);
            font-weight: 750;
        }

        .category-list {
            display: grid;
            gap: 4px;
            padding: 0 8px 10px;
        }

        .category-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 38px;
            border: 0;
            border-radius: 6px;
            background: transparent;
            color: var(--muted);
            cursor: pointer;
            padding: 0 10px;
            text-align: left;
        }

        .category-btn:hover,
        .category-btn.active {
            background: var(--surface-muted);
            color: var(--primary-dark);
        }

        .category-btn.active {
            box-shadow: inset 3px 0 0 var(--accent);
        }

        .category-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .category-count {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .recent-list {
            display: grid;
            gap: 12px;
            padding: 0 16px 16px;
        }

        .recent-link {
            display: grid;
            gap: 4px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }

        .recent-link:last-child {
            border-bottom: 0;
            padding-bottom: 0;
        }

        .recent-link strong {
            color: var(--text);
            font-size: 0.94rem;
            line-height: 1.4;
        }

        .recent-link span {
            color: var(--muted);
            font-size: 0.82rem;
        }

        .content {
            display: grid;
            gap: 24px;
            min-width: 0;
        }

        .featured {
            display: grid;
            grid-template-columns: minmax(0, 1.08fr) minmax(280px, 0.92fr);
            min-height: 320px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .featured-body {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 28px;
            padding: 32px;
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent);
            font-size: 0.84rem;
            font-weight: 760;
        }

        .featured h2 {
            margin-top: 14px;
            color: var(--primary-dark);
            font-size: clamp(1.65rem, 3vw, 2.45rem);
            line-height: 1.18;
        }

        .featured p {
            margin-top: 14px;
            color: var(--muted);
        }

        .meta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 18px;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .meta-row span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .featured-image {
            min-height: 100%;
            background: var(--surface-muted);
        }

        .featured-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .section-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            padding-top: 2px;
        }

        .section-bar h2 {
            color: var(--primary-dark);
            font-size: 1.35rem;
        }

        .result-count {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .post-list {
            display: grid;
            gap: 14px;
        }

        .post-card {
            display: grid;
            grid-template-columns: 176px minmax(0, 1fr);
            gap: 18px;
            min-height: 148px;
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--surface);
            transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
        }

        .post-card:hover {
            border-color: rgba(36, 91, 123, 0.38);
            box-shadow: 0 12px 28px rgba(31, 42, 55, 0.1);
            transform: translateY(-2px);
        }

        .post-thumb {
            width: 100%;
            height: 100%;
            min-height: 148px;
            object-fit: cover;
            background: var(--surface-muted);
        }

        .post-body {
            display: grid;
            align-content: center;
            gap: 10px;
            min-width: 0;
            padding: 18px 20px 18px 0;
        }

        .post-title {
            color: var(--text);
            font-size: 1.16rem;
            line-height: 1.35;
        }

        .post-title a:hover {
            color: var(--primary);
        }

        .post-excerpt {
            display: -webkit-box;
            overflow: hidden;
            color: var(--muted);
            font-size: 0.94rem;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            width: max-content;
            max-width: 100%;
            min-height: 26px;
            padding: 0 9px;
            border-radius: 6px;
            background: rgba(36, 91, 123, 0.1);
            color: var(--primary-dark);
            font-size: 0.78rem;
            font-weight: 700;
        }

        .read-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: max-content;
            color: var(--primary);
            font-weight: 760;
            font-size: 0.92rem;
        }

        .empty-state {
            display: none;
            border: 1px dashed var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            color: var(--muted);
            padding: 36px;
            text-align: center;
        }

        .site-footer {
            border-top: 1px solid var(--line);
            color: var(--muted);
            padding: 26px 0;
            font-size: 0.9rem;
        }

        @media (max-width: 960px) {
            .header-inner {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 14px 0;
            }

            .search {
                justify-self: stretch;
                width: 100%;
            }

            .header-count {
                display: none;
            }

            .hero,
            .layout,
            .featured {
                grid-template-columns: 1fr;
            }

            .hero {
                padding-top: 34px;
            }

            .sidebar {
                position: static;
                grid-template-columns: 1fr;
            }

            .featured-image {
                min-height: 260px;
                order: -1;
            }
        }

        @media (max-width: 640px) {
            .shell {
                width: min(100% - 24px, 1180px);
            }

            .hero-stats {
                grid-template-columns: 1fr;
            }

            .featured-body {
                padding: 22px;
            }

            .post-card {
                grid-template-columns: 1fr;
            }

            .post-thumb {
                height: 190px;
            }

            .post-body {
                padding: 0 18px 18px;
            }

            .section-bar {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="shell header-inner">
            <a class="brand" href="./index.html" aria-label="返回首页">
                <span class="brand-mark"><i class="fas fa-pen-nib"></i></span>
                <span>技术博客</span>
            </a>

            <label class="search" for="search-input">
                <i class="fas fa-magnifying-glass"></i>
                <input id="search-input" type="search" placeholder="搜索文章标题、摘要、分类">
            </label>

            <div class="header-count">
                <i class="fas fa-layer-group"></i>
                <span id="header-count">0 篇</span>
            </div>
        </div>
    </header>

    <main class="shell">
        <section class="hero">
            <div class="hero-copy">
                <h1>记录项目、代码与工程经验</h1>
                <p>把实践中的问题、方案和复盘整理成文章，方便回看，也方便继续迭代。</p>
            </div>

            <div class="hero-stats" aria-label="博客统计">
                <div class="stat">
                    <strong id="stat-posts">0</strong>
                    <span>文章</span>
                </div>
                <div class="stat">
                    <strong id="stat-categories">0</strong>
                    <span>分类</span>
                </div>
            </div>
        </section>

        <div class="layout">
            <aside class="sidebar">
                <section class="panel">
                    <div class="panel-header">
                        <span>分类</span>
                        <i class="fas fa-folder-open"></i>
                    </div>
                    <div class="category-list" id="category-list"></div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <span>最近更新</span>
                        <i class="fas fa-clock-rotate-left"></i>
                    </div>
                    <div class="recent-list" id="recent-list"></div>
                </section>
            </aside>

            <section class="content">
                <article class="featured" id="featured-post"></article>

                <div class="section-bar">
                    <h2>全部文章</h2>
                    <span class="result-count" id="result-count">正在加载...</span>
                </div>

                <div class="post-list" id="post-list"></div>
                <div class="empty-state" id="empty-state">没有找到匹配的文章</div>
            </section>
        </div>
    </main>

    <footer class="site-footer">
        <div class="shell">© <span id="year"></span> 技术博客</div>
    </footer>

    <script>
        const state = {
            posts: [],
            activeCategory: '全部',
            query: ''
        };

        const fallbackImage = 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=1170&q=80';

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('year').textContent = new Date().getFullYear();
            document.getElementById('search-input').addEventListener('input', event => {
                state.query = event.target.value.trim().toLowerCase();
                render();
            });
            loadPosts();
        });

        async function loadPosts() {
            try {
                const response = await fetch('posts-config.json', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error('posts-config.json 加载失败');
                }

                const config = await response.json();
                state.posts = Array.isArray(config.posts) ? config.posts : [];
                render();
            } catch (error) {
                console.error(error);
                document.getElementById('result-count').textContent = '加载失败';
                document.getElementById('empty-state').style.display = 'block';
                document.getElementById('empty-state').textContent = '文章配置加载失败';
            }
        }

        function render() {
            const categories = getCategories(state.posts);
            const filteredPosts = getFilteredPosts();

            renderStats(categories);
            renderCategories(categories);
            renderRecentPosts(state.posts);
            renderFeatured(state.posts[0]);
            renderPostList(filteredPosts);
        }

        function getCategories(posts) {
            const counts = posts.reduce((map, post) => {
                const category = normalizeCategory(post.category);
                map.set(category, (map.get(category) || 0) + 1);
                return map;
            }, new Map());

            return [
                { name: '全部', count: posts.length },
                ...Array.from(counts, ([name, count]) => ({ name, count }))
                    .sort((a, b) => b.count - a.count || a.name.localeCompare(b.name, 'zh-CN'))
            ];
        }

        function getFilteredPosts() {
            return state.posts.filter(post => {
                const category = normalizeCategory(post.category);
                const matchesCategory = state.activeCategory === '全部' || category === state.activeCategory;
                const haystack = [
                    post.title,
                    post.excerpt,
                    post.category,
                    post.date
                ].join(' ').toLowerCase();
                return matchesCategory && haystack.includes(state.query);
            });
        }

        function renderStats(categories) {
            document.getElementById('stat-posts').textContent = state.posts.length;
            document.getElementById('stat-categories').textContent = Math.max(categories.length - 1, 0);
            document.getElementById('header-count').textContent = `${state.posts.length} 篇`;
        }

        function renderCategories(categories) {
            const container = document.getElementById('category-list');
            container.innerHTML = '';

            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = `category-btn${category.name === state.activeCategory ? ' active' : ''}`;
                button.type = 'button';
                button.innerHTML = `
                    <span class="category-name">${escapeHtml(category.name)}</span>
                    <span class="category-count">${category.count}</span>
                `;
                button.addEventListener('click', () => {
                    state.activeCategory = category.name;
                    render();
                });
                container.appendChild(button);
            });
        }

        function renderRecentPosts(posts) {
            const container = document.getElementById('recent-list');
            container.innerHTML = posts.slice(0, 5).map(post => `
                <a class="recent-link" href="${escapeAttribute(post.link || '#')}">
                    <strong>${escapeHtml(post.title || '无标题')}</strong>
                    <span>${escapeHtml(post.date || '')}</span>
                </a>
            `).join('');
        }

        function renderFeatured(post) {
            const container = document.getElementById('featured-post');
            if (!post) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'grid';
            container.innerHTML = `
                <div class="featured-body">
                    <div>
                        <span class="eyebrow"><i class="fas fa-bookmark"></i> 最新文章</span>
                        <h2><a href="${escapeAttribute(post.link || '#')}">${escapeHtml(post.title || '无标题')}</a></h2>
                        <p>${escapeHtml(post.excerpt || '暂无摘要')}</p>
                    </div>
                    <div>
                        <div class="meta-row">
                            <span><i class="fas fa-calendar"></i>${escapeHtml(post.date || '')}</span>
                            <span><i class="fas fa-clock"></i>${escapeHtml(post.readTime || '')}</span>
                            <span><i class="fas fa-folder"></i>${escapeHtml(normalizeCategory(post.category))}</span>
                        </div>
                        <a class="read-link" href="${escapeAttribute(post.link || '#')}">阅读全文 <i class="fas fa-arrow-right"></i></a>
                    </div>
                </div>
                <a class="featured-image" href="${escapeAttribute(post.link || '#')}">
                    <img src="${escapeAttribute(post.image || fallbackImage)}" alt="${escapeAttribute(post.title || '文章封面')}" loading="eager">
                </a>
            `;
        }

        function renderPostList(posts) {
            const container = document.getElementById('post-list');
            const emptyState = document.getElementById('empty-state');

            document.getElementById('result-count').textContent = `${posts.length} 篇文章`;
            emptyState.style.display = posts.length ? 'none' : 'block';

            container.innerHTML = posts.map(post => `
                <article class="post-card">
                    <a href="${escapeAttribute(post.link || '#')}" aria-label="${escapeAttribute(post.title || '阅读全文')}">
                        <img class="post-thumb" src="${escapeAttribute(post.image || fallbackImage)}" alt="${escapeAttribute(post.title || '文章封面')}" loading="lazy">
                    </a>
                    <div class="post-body">
                        <span class="tag">${escapeHtml(normalizeCategory(post.category))}</span>
                        <h3 class="post-title">
                            <a href="${escapeAttribute(post.link || '#')}">${escapeHtml(post.title || '无标题')}</a>
                        </h3>
                        <p class="post-excerpt">${escapeHtml(post.excerpt || '暂无摘要')}</p>
                        <div class="meta-row">
                            <span><i class="fas fa-calendar"></i>${escapeHtml(post.date || '')}</span>
                            <span><i class="fas fa-clock"></i>${escapeHtml(post.readTime || '')}</span>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        function normalizeCategory(category) {
            return String(category || '未分类').replace(/^\[|\]$/g, '') || '未分类';
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        function escapeAttribute(value) {
            return escapeHtml(value).replace(/`/g, '&#96;');
        }
    </script>
</body>
</html>
